<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- ========== СТРАНИЦА ВХОДА ========== -->
        <div id="page-login" class="page active">
            <div class="container mt-5">
                <div class="row justify-content-center">
                    <div class="col-md-5">
                        <div class="card shadow">
                            <div class="card-body p-4">
                                <h3 class="text-center mb-4">Авторизация</h3>
                                <input type="text" class="form-control mb-3" placeholder="Логин" id="login-user">
                                <input type="password" class="form-control mb-3" placeholder="Пароль" id="login-pass">
                                <button class="btn btn-success w-100" id="btn-login">Войти</button>
                                <div class="text-center mt-3">
                                    <a href="#" id="goto-register">Нет аккаунта? Регистрация</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== СТРАНИЦА РЕГИСТРАЦИИ ========== -->
        <div id="page-register" class="page">
            <div class="container mt-5">
                <div class="row justify-content-center">
                    <div class="col-md-5">
                        <div class="card shadow">
                            <div class="card-body p-4">
                                <h3 class="text-center mb-4">Регистрация</h3>
                                <input type="text" class="form-control mb-2" placeholder="Логин (от 6 символов)" id="reg-login">
                                <input type="password" class="form-control mb-2" placeholder="Пароль (от 8 символов)" id="reg-pass">
                                <input type="text" class="form-control mb-2" placeholder="ФИО" id="reg-fio">
                                <input type="text" class="form-control mb-2" placeholder="Телефон 8(999)999-99-99" id="reg-phone">
                                <input type="email" class="form-control mb-3" placeholder="Email" id="reg-email">
                                <button class="btn btn-primary w-100" id="btn-register">Зарегистрироваться</button>
                                <div class="text-center mt-3">
                                    <a href="#" id="goto-login">Уже есть аккаунт? Войти</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== СТРАНИЦА ЗАЯВОК ========== -->
        <div id="page-applications" class="page">
            <div class="container mt-4">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3>Мои заявки</h3>
                            <button class="btn btn-danger btn-sm" id="btn-logout">Выйти</button>
                        </div>
                        <button class="btn btn-primary w-100 mb-3" id="btn-new-app">Новая заявка</button>
                        
                        <div id="new-app-form" style="display:none;" class="card p-3 mb-3">
                            <h5>Создание заявки</h5>
                            <input type="text" class="form-control mb-2" placeholder="Название курса" id="app-course">
                            <input type="date" class="form-control mb-2" id="app-date">
                            <select class="form-select mb-2" id="app-payment">
                                <option value="Наличными">Наличными</option>
                                <option value="Перевод по номеру телефона">Перевод по номеру телефона</option>
                            </select>
                            <button class="btn btn-success" id="btn-submit-app">Отправить</button>
                        </div>
                        
                        <div id="app-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== ПАНЕЛЬ АДМИНИСТРАТОРА ========== -->
        <div id="page-admin" class="page">
            <div class="container mt-4">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3>Панель администратора</h3>
                            <button class="btn btn-danger btn-sm" id="btn-admin-logout">Выйти</button>
                        </div>
                        <div class="alert alert-info">Список всех заявок</div>
                        <div id="admin-list"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
